anchors:
  static_training_behavior: &static_training_behavior
    allowed_methods: ["GET","HEAD","OPTIONS"]
    cached_methods: ["GET","HEAD","OPTIONS"]
    cache_policy: "CachingStaticIgnoreCacheControl"
    origin_request_policy: "Managed-AllViewerExceptHostHeader"
    response_headers_policy: "RemoveNELAndCookiesAndCacheHost"
  static_training_yandex_js_behavior: &static_training_yandex_js_behavior
    allowed_methods: ["GET","HEAD","OPTIONS","PUT","POST","PATCH","DELETE"]
    cached_methods: ["GET","HEAD","OPTIONS"]
    cache_policy: "UseOriginCacheControlHeadersExceptHost"
    origin_request_policy: "Managed-AllViewerExceptHostHeader"
    response_headers_policy: "RemoveNELAndCookiesAndCacheHost"
  avatar_behavior: &avatar_behavior
    allowed_methods: ["GET","HEAD"]
    cached_methods: ["GET","HEAD"]
    cache_policy: "Managed-CachingOptimized"
    origin_request_policy: "Managed-AllViewer"
    response_headers_policy: "RemoveNELAndCacheHost"
  avatar_behavior_normalize_webp: &avatar_behavior_normalize_webp
    allowed_methods: ["GET","HEAD"]
    cached_methods: ["GET","HEAD"]
    cache_policy: "CachingOptimized-XImageFormat"
    origin_request_policy: "Managed-AllViewer"
    response_headers_policy: "RemoveNELAndCacheHost"
  storage_behavior: &storage_behavior
    allowed_methods: ["GET","HEAD"]
    cached_methods: ["GET","HEAD"]
    cache_policy: "Managed-CachingOptimized"
    origin_request_policy: "Managed-AllViewer"

  # default cache behavior templates
  default_cache_behavior_except_host_nel: &default_cache_behavior_except_host_nel
    cache_policy: "UseOriginCacheControlHeadersExceptHost"
    origin_request_policy: "Managed-AllViewerExceptHostHeader"
    response_headers_policy: "RemoveNELAndCacheHost"
  default_cache_behavior_except_host_nel_and_cookies: &default_cache_behavior_except_host_nel_and_cookies
    cache_policy: "UseOriginCacheControlHeadersExceptHost"
    origin_request_policy: "Managed-AllViewerExceptHostHeader"
    response_headers_policy: "RemoveNELAndCookiesAndCacheHost"
  default_cache_behavior_use_origin_nel: &default_cache_behavior_use_origin_nel
    cache_policy: "UseOriginCacheControlHeaders"
    origin_request_policy: "Managed-AllViewer"
    response_headers_policy: "RemoveNELAndCacheHost"

distributions:
  # static.{yango.tech,yandexcom.net, yandexint.net}
  static:
    exclude_orgs:
    - gogettaxi
    - taxitax
    name: "static"
    origin_domain: "yastatic.net"
    default_root_object: "nonexistent"
    default_cache_behavior:
      <<: *default_cache_behavior_except_host_nel
      cache_policy: "UseOriginCacheControlHeadersExceptHost-QueryStringsV"
      response_headers_policy: "RemoveNELAndCacheHost"
    org_overrides:
      yango:
        default_root_object: ""

  # static.training.{yango.tech,yandexcom.net}
  static_training:
    exclude_orgs:
    - gogettaxi
    - taxitax
    name: "static.training"
    origin_domain: "education.training.yandex"
    additional_origins:
      - domain_name: "aws-taxi-cdn-cloudfront.s3.eu-central-1.amazonaws.com"
        origin_id: "aws-taxi-cdn-cloudfront.s3.eu-central-1.amazonaws.com"
    default_cache_behavior_target_origin_id: "aws-taxi-cdn-cloudfront.s3.eu-central-1.amazonaws.com"
    default_cache_behavior:
      <<: *default_cache_behavior_except_host_nel_and_cookies
    ordered_cache_behaviors:
      - <<: *static_training_behavior
        path_pattern: "/*.js"
        target_origin_id: "education.training.yandex"
      - <<: *static_training_behavior
        path_pattern: "/*.css"
        target_origin_id: "education.training.yandex"
      - <<: *static_training_behavior
        path_pattern: "/assets/*"
        target_origin_id: "education.training.yandex"
    org_overrides:
      yandex:
        ordered_cache_behaviors:
          - <<: *static_training_yandex_js_behavior
            path_pattern: "/*.js"
            target_origin_id: "education.training.yandex"
          - <<: *static_training_behavior
            path_pattern: "/*.css"
            target_origin_id: "education.training.yandex"
          - <<: *static_training_behavior
            path_pattern: "/assets/*"
            target_origin_id: "education.training.yandex"

  # Media and Storage Services
  # avatars.mds.{yango.tech, yandexcom.net}
  avatars_mds:
    exclude_orgs:
    - gogettaxi
    - taxitax
    name: "avatars.mds"
    origin_domain: "avatars.mds.yandex.net"
    default_cache_behavior:
      <<: *default_cache_behavior_use_origin_nel
    ordered_cache_behaviors:
      - <<: *avatar_behavior
        path_pattern: "/*.js"
        target_origin_id: "avatars.mds.yandex.net"
      - <<: *avatar_behavior
        path_pattern: "/*.jpg"
        target_origin_id: "avatars.mds.yandex.net"
      - <<: *avatar_behavior
        path_pattern: "/*.jpeg"
        target_origin_id: "avatars.mds.yandex.net"
      - <<: *avatar_behavior
        path_pattern: "/*.gif"
        target_origin_id: "avatars.mds.yandex.net"
      - <<: *avatar_behavior
        path_pattern: "/*.css"
        target_origin_id: "avatars.mds.yandex.net"
      - <<: *avatar_behavior
        path_pattern: "/*.png"
        target_origin_id: "avatars.mds.yandex.net"
    org_overrides:
      yango:
        ordered_cache_behaviors:
          - <<: *avatar_behavior_normalize_webp
            path_pattern: "/get-yango-marketplace/*"
            target_origin_id: "avatars.mds.yandex.net"
            viewer_request_function: "normalize_webp"
          - <<: *avatar_behavior
            path_pattern: "/*.css"
            target_origin_id: "avatars.mds.yandex.net"
          - <<: *avatar_behavior
            path_pattern: "/*.jpg"
            target_origin_id: "avatars.mds.yandex.net"
          - <<: *avatar_behavior
            path_pattern: "/*.png"
            target_origin_id: "avatars.mds.yandex.net"
          - <<: *avatar_behavior
            path_pattern: "/*.gif"
            target_origin_id: "avatars.mds.yandex.net"
          - <<: *avatar_behavior
            path_pattern: "/*.jpeg"
            target_origin_id: "avatars.mds.yandex.net"
          - <<: *avatar_behavior
            path_pattern: "/*.js"
            target_origin_id: "avatars.mds.yandex.net"

  avatars_mds_buy:
    exclude_orgs:
    - gogettaxi
    - taxitax
    - yandex
    name: "avatars-buy.mds"
    origin_domain: "avatars.mds.yandex.net"
    viewer_request_function: "return_404"
    default_cache_behavior:
      <<: *avatar_behavior
    ordered_cache_behaviors:
      - <<: *avatar_behavior_normalize_webp
        path_pattern: "/get-yango-marketplace/*"
        target_origin_id: "avatars.mds.yandex.net"
        viewer_request_function: "normalize_webp"

  # storage.mds.{yango.tech, yandexcom.net}
  storage_mds_yandexcom:
    exclude_orgs:
    - gogettaxi
    - taxitax
    name: "storage.mds"
    origin_domain: "storage.mds.yandex.net"
    default_cache_behavior:
      <<: *default_cache_behavior_use_origin_nel
    ordered_cache_behaviors:
      - <<: *storage_behavior
        path_pattern: "/*.js"
        target_origin_id: "storage.mds.yandex.net"
      - <<: *storage_behavior
        path_pattern: "/*.jpg"
        target_origin_id: "storage.mds.yandex.net"
      - <<: *storage_behavior
